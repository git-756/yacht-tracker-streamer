<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polaris Monitoring from Tug</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .back-btn-container {
            text-align: left;
            margin-bottom: 15px;
            padding: 20px;
        }
        .back-btn {
            display: inline-block;
            text-decoration: none;
            font-size: 14px;
            background-color: #6c757d;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .back-btn:hover {
            background-color: #5a6268;
            color: white;
        }
    </style>
</head>
<body>

    <div class="back-btn-container">
        <a href="#" id="back-to-portal" class="back-btn">⬅ TOP</a>
    </div>
    
    <script>
        // アクセス中のIPアドレスを取得し、ポート3000のポータルURLを自動生成してセットする
        const currentHost = window.location.hostname;
        document.getElementById('back-to-portal').href = `https://${currentHost}:3000/portal.html`;
    </script>

    <h2>Polaris Monitoring from Tug</h2>
    
    <div class="video-container">
        <!-- ブラウザ標準機能で直接ストリームを描画します -->
        <img id="videoStream" src="{{ url_for('video_feed') }}" crossorigin="anonymous" alt="カメラ映像を受信中...">
    </div>
    
    <p id="status">映像ストリームに接続中...</p>
    
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
