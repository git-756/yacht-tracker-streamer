<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現在地記録アプリ（リアルタイム同期版）</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="pos-style.css">
</head>
<body>

    <div style="margin-bottom: 15px; text-align: left;">
        <a href="#" id="back-to-portal" style="display: inline-block; text-decoration: none; font-size: 14px; background-color: #6c757d; color: white; padding: 8px 15px; border-radius: 5px; font-weight: bold;">⬅ TOP</a>
    </div>

    <div id="role-modal">
        <div class="modal-content">
            <h2>参加モードを選択</h2>
            <p>※操作者は現在地の記録・更新・リセットが可能です。<br>閲覧者はリアルタイムでの状況確認とデータの保存が行えます。</p>
            <button class="role-btn role-op" onclick="selectRole('operator')">🛠️ 操作者として参加</button>
            <button class="role-btn role-vw" onclick="selectRole('viewer')">👀 閲覧者として参加</button>
        </div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 style="margin: 0;">現在地の記録 <span id="current-role-disp" style="font-size: 0.6em;"></span></h2>
        <button class="reset-btn" id="full-reset-btn" onclick="fullReset()">⚠️ 全リセット</button>
    </div>

    <div id="manual-mode-container" style="display: none; align-items: center; margin-bottom: 15px; background: #fff3cd; padding: 10px; border-radius: 5px; border: 1px solid #ffeeba;">
        <label class="switch">
            <input type="checkbox" id="manual-mode-switch" onchange="toggleManualMode()">
            <span class="slider"></span>
        </label>
        <span style="font-weight: bold; color: #856404; font-size: 14px;">手動入力モードを有効にする</span>
    </div>
    
    <div class="status-box">
        <strong>現在のステータス:</strong> <span id="status">位置情報を取得中...</span><br>
        <small>リアルタイム座標: <span id="current-coords">--</span></small>
    </div>

    <input type="file" id="csv-input-base" accept=".csv" style="display: none;" onchange="loadFromCSV(event, 'base')">
    <input type="file" id="csv-input-check" accept=".csv" style="display: none;" onchange="loadFromCSV(event, 'check')">
    
    <div class="csv-container">
        <div class="csv-box">
            <button class="load-btn" style="width: 100%;" onclick="document.getElementById('csv-input-base').click()">📁 ベースCSV読込 (青枠線)</button>
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div id="base-csv-name" class="file-name-label">未選択</div>
                <button class="reset-btn" id="base-reset-btn" onclick="resetSingleCsv('base')" style="padding: 5px 10px; font-size: 12px; margin-left: 10px; white-space: nowrap;">🗑️ クリア</button>
            </div>
        </div>

        <div class="csv-box">
            <button class="load-btn" style="width: 100%; background-color: #ffc107; color: #333; font-weight: bold;" onclick="document.getElementById('csv-input-check').click()" onmouseover="this.style.backgroundColor='#e0a800'" onmouseout="this.style.backgroundColor='#ffc107'">🟡 確認用CSV読込 (黄ピン)</button>
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div id="check-csv-name" class="file-name-label">未選択</div>
                <button class="reset-btn" id="check-reset-btn" onclick="resetSingleCsv('check')" style="padding: 5px 10px; font-size: 12px; margin-left: 10px; white-space: nowrap;">🗑️ クリア</button>
            </div>
        </div>
    </div>

    <div id="map"></div>
    <div id="input-container"></div>
    <button class="add-btn" id="add-point-btn" onclick="addPoint()" style="display: none;">➕ 測定地点を追加</button>

    <div class="action-container">
        <button class="save-btn" onclick="saveToCSV()">💾 確定 (CSV保存)</button>
        <button class="reset-btn" id="coord-reset-btn" onclick="coordReset()">🗑️ 座標リセット</button>
    </div>

    <div class="disclaimer">
        <strong>※注意事項（利用について）</strong><br>
        本ツールは位置情報収集・共有ツールです。取得した位置情報は本画面での座標記録目的のみに使用され、バックグラウンドでの監視等は行いません。関係者以外の利用はお控えください。
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="pos-script.js"></script>

</body>
</html>
