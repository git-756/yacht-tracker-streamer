<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現在地記録アプリ（リアルタイム同期版）</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .status-box { background-color: #f0f0f0; padding: 10px; margin-bottom: 20px; border-radius: 5px; }
        #map { height: 300px; width: 100%; margin-bottom: 20px; border-radius: 5px; border: 1px solid #ccc; z-index: 1; }
        .input-group { display: flex; align-items: center; margin-bottom: 15px; }
        .record-btn { padding: 10px 15px; font-size: 14px; cursor: pointer; margin-right: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; white-space: nowrap; }
        .record-btn:hover { background-color: #0056b3; }
        .record-btn:disabled { background-color: #ccc; cursor: not-allowed; }
        input[type="text"] { flex-grow: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; background-color: #fafafa; margin-right: 10px; transition: background-color 0.5s; }
        .copy-btn { padding: 10px 15px; font-size: 14px; cursor: pointer; background-color: #6c757d; color: white; border: none; border-radius: 5px; }
        .copy-btn:hover { background-color: #5a6268; }
        
        /* ★追加・変更: ゴミ箱ボタンと追加ボタンのスタイル */
        .delete-btn {
            background-color: #dc3545; color: white; border: none; border-radius: 5px; padding: 10px 15px; cursor: pointer; font-size: 14px;
            transition: background-color 0.2s; margin-left: 5px;
        }
        .delete-btn:hover { background-color: #c82333; }
        .add-btn {
            padding: 10px 20px; font-size: 15px; background-color: #ff9800; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s; width: 100%; margin-bottom: 20px;
        }
        .add-btn:hover { background-color: #e68a00; }

        .action-container { display: flex; justify-content: space-between; margin-bottom: 20px; padding-top: 20px; border-top: 1px solid #ccc; }
        .save-btn { padding: 10px 15px; background-color: #28a745; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .save-btn:hover { background-color: #218838; }
        
        .reset-btn { padding: 10px 15px; background-color: #dc3545; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .reset-btn:hover { background-color: #c82333; }
        .reset-btn:disabled { background-color: #ccc; cursor: not-allowed; }

        .load-btn { padding: 10px 15px; background-color: #17a2b8; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .load-btn:hover { background-color: #138496; }
        .disclaimer { background-color: #fff3cd; color: #856404; padding: 12px; border: 1px solid #ffeeba; border-radius: 5px; margin-top: 30px; margin-bottom: 20px; font-size: 0.9em; }
        
        #role-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .modal-content { background: white; padding: 30px; border-radius: 10px; text-align: center; max-width: 400px; }
        .role-btn { display: block; width: 100%; padding: 15px; margin: 15px 0; font-size: 18px; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .role-op { background-color: #dc3545; }
        .role-vw { background-color: #007bff; }
    </style>
</head>
<body>

    <div style="margin-bottom: 15px; text-align: left;">
        <a href="#" id="back-to-portal" style="display: inline-block; text-decoration: none; font-size: 14px; background-color: #6c757d; color: white; padding: 8px 15px; border-radius: 5px; font-weight: bold;">⬅ TOP</a>
    </div>
    <script>
        document.getElementById('back-to-portal').href = `https://${window.location.hostname}:3000/portal.html`;
    </script>

    <div id="role-modal">
        <div class="modal-content">
            <h2>参加モードを選択</h2>
            <p>※操作者は現在地の記録・更新・リセットが可能です。<br>閲覧者はリアルタイムでの状況確認とデータの保存が行えます。</p>
            <button class="role-btn role-op" onclick="selectRole('operator')">🛠️ 操作者として参加</button>
            <button class="role-btn role-vw" onclick="selectRole('viewer')">👀 閲覧者として参加</button>
        </div>
    </div>

    <h2>現在地の記録 <span id="current-role-disp" style="font-size: 0.6em; color: gray;"></span></h2>
    
    <div class="status-box">
        <strong>現在のステータス:</strong> <span id="status">位置情報を取得中...</span><br>
        <small>リアルタイム座標: <span id="current-coords">--</span></small>
    </div>

    <input type="file" id="csv-input-base" accept=".csv" style="display: none;" onchange="loadFromCSV(event, 'base')">
    <input type="file" id="csv-input-check" accept=".csv" style="display: none;" onchange="loadFromCSV(event, 'check')">
    <div style="margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
        <button class="load-btn" onclick="document.getElementById('csv-input-base').click()">📁 ベースCSV読込 (エリア枠線)</button>
        <button class="load-btn" style="background-color: #ffc107; color: #333; font-weight: bold;" onclick="document.getElementById('csv-input-check').click()" onmouseover="this.style.backgroundColor='#e0a800'" onmouseout="this.style.backgroundColor='#ffc107'">🟡 確認用CSV読込 (黄色ピン)</button>
    </div>

    <div id="map"></div>

    <div id="input-container"></div>

    <button class="add-btn" id="add-point-btn" onclick="addPoint()" style="display: none;">➕ 測定地点を追加</button>

    <div class="action-container">
        <button class="save-btn" onclick="saveToCSV()">💾 確定 (CSV保存)</button>
        <button class="reset-btn" id="reset-btn" onclick="resetData()">🗑️ リセット</button>
    </div>

    <div class="disclaimer">
        <strong>※注意事項（利用について）</strong><br>
        本ツールは係留レス洋上発電業務の試験用ツールです。取得した位置情報は本画面での座標記録目的のみに使用され、バックグラウンドでの監視等は行いません。関係者以外の利用はお控えください。（CPV13）
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="/socket.io/socket.io.js"></script>

    <script>
        let userRole = null; 
        const socket = io(); 
        const TEST_MODE = 1;

        let originalCsvLines = null;
        let originalCsvFileName = null;

        // ★追加: 現在表示されている入力枠のIDを管理するリスト (初期状態はV1〜V3)
        let pointIds = ['v1', 'v2', 'v3'];

        const yellowIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-yellow.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        // ページ読み込み時に初期の入力枠(V1〜V3)を生成
        document.addEventListener('DOMContentLoaded', () => {
            initPoints();
        });

        function initPoints() {
            const container = document.getElementById('input-container');
            container.innerHTML = '';
            pointIds.forEach(id => createPointElement(id));
        }

        // --- ★追加: 動的に入力枠を生成する関数 ---
        function createPointElement(id) {
            const container = document.getElementById('input-container');
            if (document.getElementById(`group-${id}`)) return; // 既に存在する場合は無視

            const upperId = id.toUpperCase();
            const group = document.createElement('div');
            group.className = 'input-group';
            group.id = `group-${id}`;

            // HTMLの骨組みを生成
            group.innerHTML = `
                <button class="record-btn" id="record-${id}" onclick="recordLocation('${id}')">${upperId}</button>
                <input type="text" id="${id}-input" readonly placeholder="${upperId}の座標">
                <button class="copy-btn" onclick="copyToClipboard('${id}-input')">コピー</button>
                <button class="delete-btn" id="del-${id}" onclick="deletePoint('${id}')" style="display: none;">🗑️</button>
            `;
            container.appendChild(group);

            // 手動入力された際のサーバー送信処理 (テストモード用)
            const inputEl = document.getElementById(`${id}-input`);
            inputEl.addEventListener('change', (e) => {
                if (userRole === 'operator') {
                    socket.emit('update_coords', { targetId: id, coords: e.target.value });
                }
            });
            
            // 現在のロールに合わせて見た目を整える
            if (userRole) applyRoleToPoint(id);
        }

        // --- ★追加: 各入力枠の表示/非表示や読み取り専用を制御する関数 ---
        function applyRoleToPoint(id) {
            const recordBtn = document.getElementById(`record-${id}`);
            const inputEl = document.getElementById(`${id}-input`);
            const delBtn = document.getElementById(`del-${id}`);
            if (!recordBtn || !inputEl || !delBtn) return;

            if (userRole === 'operator') {
                recordBtn.disabled = false;
                recordBtn.innerText = id.toUpperCase();
                delBtn.style.display = 'inline-block'; // ゴミ箱を表示
                if (TEST_MODE === 1) {
                    inputEl.removeAttribute('readonly');
                    inputEl.placeholder = `${id.toUpperCase()}の座標 (手動入力可)`;
                } else {
                    inputEl.setAttribute('readonly', true);
                    inputEl.placeholder = `${id.toUpperCase()}の座標`;
                }
            } else if (userRole === 'viewer') {
                recordBtn.disabled = true;
                recordBtn.innerText = '操作不可';
                delBtn.style.display = 'none'; // 閲覧者にはゴミ箱を見せない
                inputEl.setAttribute('readonly', true);
                inputEl.placeholder = `${id.toUpperCase()}の座標`;
            }
        }

        // --- ★追加: 新しい入力枠を追加する関数 ---
        function addPoint() {
            if (userRole !== 'operator') return;
            
            // 現在の番号の最大値を調べ、+1した番号を生成
            let maxNum = 0;
            pointIds.forEach(id => {
                const num = parseInt(id.substring(1));
                if (num > maxNum) maxNum = num;
            });
            
            const newId = `v${maxNum + 1}`;
            pointIds.push(newId);
            createPointElement(newId);
        }

        // --- ★追加: 入力枠を削除する関数 ---
        function deletePoint(id) {
            if (userRole !== 'operator') return;
            
            if (pointIds.length <= 1) {
                alert("少なくとも1つの地点は残す必要があります。");
                return;
            }
            
            if (confirm(`${id.toUpperCase()} を削除しますか？\n（入力されている座標も消去されます）`)) {
                removePointElement(id);
                // 他の閲覧者の画面からも消すために「DELETED」という合図を送る
                socket.emit('update_coords', { targetId: id, coords: 'DELETED' });
            }
        }

        // 画面上から入力枠を消し去る処理
        function removePointElement(id) {
            const index = pointIds.indexOf(id);
            if (index > -1) pointIds.splice(index, 1);
            
            const group = document.getElementById(`group-${id}`);
            if (group) group.remove();
        }

        // --- ★変更: ロール選択時の処理 (追加ボタンの表示制御など) ---
        function selectRole(role) {
            userRole = role;
            document.getElementById('role-modal').style.display = 'none'; 
            
            let roleText = role === 'operator' ? '[操作者モード]' : '[閲覧者モード]';
            if (TEST_MODE === 1) {
                roleText += ' <span style="color:red; font-weight:bold;">[TEST MODE]</span>';
            }
            document.getElementById('current-role-disp').innerHTML = roleText;

            // 操作者のみ「追加ボタン」を表示
            document.getElementById('add-point-btn').style.display = (role === 'operator') ? 'block' : 'none';

            const resetBtn = document.getElementById('reset-btn');
            if(resetBtn) {
                if (role === 'viewer') {
                    resetBtn.disabled = true;
                    resetBtn.innerText = '操作不可';
                } else {
                    resetBtn.disabled = false;
                    resetBtn.innerText = '🗑️ リセット';
                }
            }

            // 既存のすべての枠にロールを適用
            pointIds.forEach(id => applyRoleToPoint(id));
        }

        // --- ★変更: ソケット受信時の処理 (追加と削除の同期) ---
        socket.on('init_coords', (data) => updateFieldsFromSocket(data));
        socket.on('coords_updated', (data) => {
            const tempObj = {};
            tempObj[data.targetId] = data.coords;
            updateFieldsFromSocket(tempObj);
        });

        socket.on('coords_reset', () => {
            clearScreen();
            alert("操作者により座標データがリセットされました。");
        });

        function updateFieldsFromSocket(data) {
            for (const [key, val] of Object.entries(data)) {
                // 削除指令を受信した場合
                if (val === 'DELETED') {
                    removePointElement(key);
                    continue;
                }
                
                // 値が入っている場合 (新規追加されたものも含む)
                if (val !== undefined && val !== null && val !== '') {
                    // 自分の画面にその枠がまだ無ければ、自動で作って追加する
                    if (!pointIds.includes(key)) {
                        pointIds.push(key);
                        createPointElement(key);
                        sortPointElements(); // V1, V2の順番が崩れないように並び替える
                    }
                    
                    const inputField = document.getElementById(`${key}-input`);
                    if (inputField && inputField.value !== val) {
                        inputField.value = val;
                        inputField.style.backgroundColor = '#d4edda';
                        setTimeout(() => { inputField.style.backgroundColor = '#fafafa'; }, 1000);
                    }
                } 
                // 値が空になった場合 (リセットや手動クリア時)
                else if (val === '') {
                    const inputField = document.getElementById(`${key}-input`);
                    if (inputField && inputField.value !== val) {
                        inputField.value = val;
                    }
                }
            }
        }

        // 枠の表示順を V1, V2, V3... と数字順に綺麗に並び替える
        function sortPointElements() {
            const container = document.getElementById('input-container');
            const groups = Array.from(container.children);
            groups.sort((a, b) => {
                const numA = parseInt(a.id.replace('group-v', ''));
                const numB = parseInt(b.id.replace('group-v', ''));
                return numA - numB;
            });
            groups.forEach(g => container.appendChild(g));
        }

        function resetData() {
            if (userRole !== 'operator') return;
            const isConfirmed = confirm("記録した座標と地図のピンをすべてリセットしますか？\n（追加したV地点も初期状態に戻ります）");
            
            if (isConfirmed) {
                clearScreen(); 
                socket.emit('reset_coords'); 
            }
        }

        // --- ★変更: リセット時に初期のV1〜V3状態に戻す ---
        function clearScreen() {
            // V4以降の追加された枠は完全に削除する
            const idsToRemove = pointIds.filter(id => parseInt(id.substring(1)) > 3);
            idsToRemove.forEach(id => removePointElement(id));

            // V1〜V3は残して中身だけ空にする
            pointIds.forEach(id => {
                const el = document.getElementById(`${id}-input`);
                if (el) {
                    el.value = '';
                    el.style.backgroundColor = '#f8d7da';
                    setTimeout(() => { el.style.backgroundColor = '#fafafa'; }, 1000);
                }
            });
            if(loadedMarkersLayer) loadedMarkersLayer.clearLayers();
            if(checkMarkersLayer) checkMarkersLayer.clearLayers();
            originalCsvLines = null;
            originalCsvFileName = null;
        }

        let currentLat = null;
        let currentLng = null;
        const statusEl = document.getElementById('status');
        const coordsEl = document.getElementById('current-coords');

        const map = L.map('map').setView([35.6895, 139.6917], 5); 
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        let currentMarker = null;
        let loadedMarkersLayer = L.layerGroup().addTo(map);
        let checkMarkersLayer = L.layerGroup().addTo(map);

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (position) => {
                    currentLat = position.coords.latitude;
                    currentLng = position.coords.longitude;
                    statusEl.innerText = "取得完了（更新中）";
                    statusEl.style.color = "green";
                    coordsEl.innerText = `${currentLat.toFixed(6)}, ${currentLng.toFixed(6)}`;
                    
                    const newLatLng = [currentLat, currentLng];
                    if (currentMarker) {
                        currentMarker.setLatLng(newLatLng);
                    } else {
                        currentMarker = L.marker(newLatLng).addTo(map).bindPopup('現在地').openPopup();
                        map.setView(newLatLng, 15);
                    }
                },
                (error) => {
                    statusEl.innerText = `エラー: ${error.message}`;
                    statusEl.style.color = "red";
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        function recordLocation(targetId) {
            if (userRole !== 'operator') return;

            if (currentLat !== null && currentLng !== null) {
                const inputField = document.getElementById(`${targetId}-input`);
                const coordsStr = `${currentLat}, ${currentLng}`;
                inputField.value = coordsStr;
                socket.emit('update_coords', { targetId: targetId, coords: coordsStr });
            } else {
                alert("現在地をまだ取得できていません。少し待ってから再度お試しください。");
            }
        }

        function copyToClipboard(inputId) {
            const copyText = document.getElementById(inputId).value;
            if (!copyText) return alert("コピーする座標がありません。");
            navigator.clipboard.writeText(copyText).then(() => alert("コピーしました: " + copyText)).catch(err => console.error(err));
        }

        // --- ★変更: 保存時に「現在画面に存在する数だけ」処理するよう対応 ---
        function saveToCSV() {
            // 現在の枠をV1, V2, V3... の順に並び替えてから値を取得
            const sortedIds = [...pointIds].sort((a, b) => parseInt(a.substring(1)) - parseInt(b.substring(1)));
            const vVals = sortedIds.map(id => document.getElementById(`${id}-input`).value);
            
            let finalCsvContent = "";
            
            if (originalCsvLines && originalCsvLines.length > 0) {
                let newLines = [];
                let wayIndex = 0;
                
                for (let i = 0; i < originalCsvLines.length; i++) {
                    let line = originalCsvLines[i];
                    
                    if (line.startsWith('way,')) {
                        // 画面の入力枠の数だけテンプレートのway行を上書きする
                        if (wayIndex < vVals.length) {
                            const val = vVals[wayIndex];
                            const commaCount = (line.match(/,/g) || []).length;
                            const trailingCommas = ",".repeat(Math.max(0, commaCount - 2));
                            
                            if (val && val !== '') {
                                const coords = val.split(', ');
                                line = `way,${coords[0]},${coords[1]}${trailingCommas}`;
                            } else {
                                line = `way,,${trailingCommas}`; 
                            }
                        } else {
                            // 画面の入力枠よりテンプレートのway行が多い場合は空欄にしておく
                            const commaCount = (line.match(/,/g) || []).length;
                            const trailingCommas = ",".repeat(Math.max(0, commaCount - 2));
                            line = `way,,${trailingCommas}`; 
                        }
                        wayIndex++;
                    }
                    newLines.push(line);
                }
                finalCsvContent = newLines.join('\n');
            } else {
                finalCsvContent = "Point,Latitude,Longitude\n";
                sortedIds.forEach((id) => {
                    const val = document.getElementById(`${id}-input`).value;
                    const name = id.toUpperCase();
                    if (val && val !== '') {
                        const parts = val.split(', ');
                        finalCsvContent += `${name},${parts[0]},${parts[1]}\n`;
                    } else {
                        finalCsvContent += `${name},,\n`;
                    }
                });
            }

            const now = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            const datetimeStr = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
            
            let defaultName = originalCsvFileName ? `updated_${originalCsvFileName}` : `${datetimeStr}_V-pos.csv`;
            const fileName = prompt("保存するファイル名を入力してください", defaultName);
            
            if (!fileName) return; 
            const finalFileName = fileName.endsWith('.csv') ? fileName : fileName + '.csv';

            const blob = new Blob([finalCsvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = finalFileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // CSV読み込み (ベース/確認用 の切り替え)
        function loadFromCSV(event, mode) {
            const file = event.target.files[0];
            if (!file) return;
            if (mode === 'base') originalCsvFileName = file.name; 
            
            const reader = new FileReader();
            reader.onload = (e) => processCSV(e.target.result, mode);
            reader.readAsText(file);
            event.target.value = '';
        }

        function processCSV(csvText, mode) {
            const lines = csvText.split(/\r?\n/);
            let bounds = [];
            
            if (mode === 'base') {
                loadedMarkersLayer.clearLayers();
                originalCsvLines = lines; 
                let edgePoints = [];
                
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;
                    const parts = line.split(',');
                    
                    if (parts[0] === 'edge') {
                        const lat = parseFloat(parts[1]);
                        const lng = parseFloat(parts[2]);
                        if (!isNaN(lat) && !isNaN(lng)) {
                            edgePoints.push([lat, lng]);
                            bounds.push([lat, lng]);
                        }
                    }
                }
                if (edgePoints.length > 0) {
                    L.polyline(edgePoints, {color: '#007bff', weight: 3, opacity: 0.6}).addTo(loadedMarkersLayer);
                }
                
            } else if (mode === 'check') {
                checkMarkersLayer.clearLayers();
                let wayIndex = 1;
                
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;
                    const parts = line.split(',');
                    
                    if (parts[0] === 'way') {
                        const lat = parseFloat(parts[1]);
                        const lng = parseFloat(parts[2]);
                        if (!isNaN(lat) && !isNaN(lng)) {
                            const marker = L.marker([lat, lng], {icon: yellowIcon}).bindPopup(`<b>確認用: V${wayIndex}</b>`);
                            checkMarkersLayer.addLayer(marker);
                            bounds.push([lat, lng]);
                        }
                        wayIndex++;
                    }
                }
            }

            if (bounds.length > 1) map.fitBounds(bounds);
            else if (bounds.length === 1) map.setView(bounds[0], 15);
        }
    </script>

</body>
</html>
